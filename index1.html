<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЖК Примерный</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background-color: #ffffff;
            padding: 40px 50px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            font-size: 16px;
            margin-top: 0;
            margin-bottom: 30px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            display: inline-block;
            padding: 14px 20px;
            background-color: #0088cc;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            transition: background-color 0.2s ease;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #006699;
        }
        .btn.telegram {
            background-color: #2aabee;
        }
        .btn.telegram:hover {
            background-color: #1b8bc9;
        }
        .btn.whatsapp {
            background-color: #25d366;
        }
        .btn.whatsapp:hover {
            background-color: #1ebe5c;
        }
        .qr-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .qr-section p {
            color: #555;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .qr-codes {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .qr-item {
            text-align: center;
        }
        .qr-item img {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            border: 1px solid #ddd;
            background: white;
            padding: 5px;
        }
        .qr-item .label {
            font-size: 12px;
            color: #777;
            margin-top: 4px;
        }
        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🏢 ЖК Примерный</h1>
        <p class="subtitle">Связь с соседями и чат дома</p>

        <div class="links">
            <a href="https://t.me/Yakobi_Park" class="btn telegram" target="_blank">📱 Обший чат ЖК в Telegram</a>
            <a href="https://max.ru/join/6f4XAEqMGQY6RSePlbq4Y02-dL-mpjecFTX8A57i6vU" class="btn whatsapp" target="_blank">💬 Обший чат ЖК в Макс</a>
        </div>

        <div class="qr-section">
            <p>Наведите камеру на QR-код для быстрого перехода</p>
            <div class="qr-codes">
                <div class="qr-item">
                    <img src="qrcode-telegram.png" alt="QR-код Telegram" />
                    <div class="label">Telegram-чат</div>
                </div>
                <div class="qr-item">
                    <img src="qrcode-max.png" alt="QR-код Макс" />
                    <div class="label">Макс</div>
                </div>
            </div>
        </div>

        <div class="footer">
            ЖК Примерный • Ваш уютный дом
        </div>
    </div>
</body>
</html>
